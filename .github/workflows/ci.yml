name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate 1 — Lint
        run: npm run lint

      - name: Gate 2 — Test
        run: npm run test

      - name: Gate 3 — Build
        run: npm run build

      - name: Gate 4 — Security Audit
        run: npm audit --audit-level=high
